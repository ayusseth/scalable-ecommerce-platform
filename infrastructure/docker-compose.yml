services:

  postgres:
    image: postgres:17
    container_name: ecommerce-postgres

    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: ecommerce-redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: