spring:
  application:
    name: ecommerce

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: false

server:
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    org.springframework.security: DEBUG

jwt:
  secret: 7XhLk93mPqRt5VzY8NwKs2BdLmQe4GhY7XhLk93mPqRt5VzY8NwKs2BdLmQe4GhY
