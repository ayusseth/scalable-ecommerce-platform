services:

  postgres:
    image: postgres:17
    container_name: ecommerce-postgres

    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: ecommerce-redis

    ports:
      - "6379:6379"

  ecommerce-app:
    build:
      context: .

    container_name: ecommerce-app

    depends_on:
      - postgres
      - redis

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ecommerce
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

      REDIS_HOST: redis
      REDIS_PORT: 6379

    ports:
      - "8080:8080"

volumes:
  postgres_data: